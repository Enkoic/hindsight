name: Feature request
description: Propose a new collector, exporter, workflow, or UX improvement.
title: "[Feature]: "
labels:
  - enhancement
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem to solve
      description: What workflow is blocked or awkward today?
      placeholder: I can collect local AI logs, but I cannot export a weekly rollup to...
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: Describe the desired CLI/API behavior.
      placeholder: Add `hindsight export html --week ...` that writes a self-contained report.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Existing workarounds or adjacent designs you've considered.
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Collector
        - Exporter
        - Summarizer
        - CLI / UX
        - Scheduling
        - Documentation
        - Privacy / Security
        - Other
    validations:
      required: true
  - type: textarea
    id: context
    attributes:
      label: Context
      description: Privacy constraints, source format, sample paths, or output needs.
      placeholder: The source is a local SQLite DB under ~/.tool/logs.db and timestamps are local time.
